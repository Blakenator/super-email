# SuperMail Deployment Workflow
#
# This workflow deploys the application to AWS.
# It can be triggered manually or automatically on merge to main.
#
# Required GitHub Secrets:
#   - AWS_ACCESS_KEY_ID: AWS access key with deployment permissions
#   - AWS_SECRET_ACCESS_KEY: AWS secret access key
#   - AWS_REGION: AWS region (e.g., us-west-1)
#   - PULUMI_ACCESS_TOKEN: Pulumi access token for state management
#   - SUPABASE_URL: Supabase project URL
#   - SUPABASE_ANON_KEY: Supabase anon/public key
#   - SUPABASE_SERVICE_ROLE_KEY: Supabase service role key
#
# Optional GitHub Secrets (billing — see also docs/BILLING.md):
#   - STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_PUBLISHABLE_KEY
#   - STRIPE_PRICE_STORAGE_BASIC / PRO / ENTERPRISE
#   - STRIPE_PRICE_ACCOUNTS_BASIC / PRO / ENTERPRISE
#   - STRIPE_PRICE_DOMAINS_BASIC / PRO / ENTERPRISE
#   - STRIPE_PRICE_PLATFORM_BASE (platform base fee; required if other Stripe prices are set)
#   All STRIPE_PRICE_* values are copied into Pulumi config by scripts/deploy-infrastructure.sh
#   (camelCase keys) and injected into the ECS task as STRIPE_PRICE_* env vars.
#
# Optional GitHub Secrets (custom domain + Cloudflare — passed through to deploy-infrastructure.sh):
#   - DOMAIN_NAME: Apex hostname (e.g., super-mail.app) for CloudFront/ACM and FRONTEND_URL
#   - CLOUDFLARE_ZONE_ID: DNS zone ID in Cloudflare
#   - CLOUDFLARE_API_TOKEN: API token (Cloudflare Pulumi provider reads from env)
#
# Optional GitHub Secrets (regional SES — SES is not available in every region):
#   - SES_REGION: e.g., us-west-2 when the stack runs in us-west-1
#
# Generated in AWS by Pulumi (no GitHub secret unless you override via config below):
#   - DB_* , S3 bucket names, SQS URL, INTERNAL_API_TOKEN, JWT_SECRET (Secrets Manager → ECS)
#
# Optional GitHub Secrets (OAuth + Firebase — passed to deploy-infrastructure.sh → Pulumi → ECS):
#   - GOOGLE_OAUTH_CLIENT_ID, GOOGLE_OAUTH_CLIENT_SECRET
#   - YAHOO_OAUTH_CLIENT_ID, YAHOO_OAUTH_CLIENT_SECRET
#   - OUTLOOK_OAUTH_CLIENT_ID, OUTLOOK_OAUTH_CLIENT_SECRET
#   - FIREBASE_SERVICE_ACCOUNT_JSON (full service account JSON string; minify to one line or use multiline secret)
# Redirect URIs are computed in infra from the deployed FRONTEND_URL (…/api/oauth/{provider}/callback).

name: Deploy to AWS

on:
  # Manual trigger with environment selection
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

  # Uncomment to enable automatic deployment on merge to main
  # push:
  #   branches:
  #     - main

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.18.2'

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Pulumi
        uses: pulumi/actions@v5

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get AWS Account ID
        id: get-account-id
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

      - name: Deploy Infrastructure
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_PRICE_STORAGE_BASIC: ${{ secrets.STRIPE_PRICE_STORAGE_BASIC }}
          STRIPE_PRICE_STORAGE_PRO: ${{ secrets.STRIPE_PRICE_STORAGE_PRO }}
          STRIPE_PRICE_STORAGE_ENTERPRISE: ${{ secrets.STRIPE_PRICE_STORAGE_ENTERPRISE }}
          STRIPE_PRICE_ACCOUNTS_BASIC: ${{ secrets.STRIPE_PRICE_ACCOUNTS_BASIC }}
          STRIPE_PRICE_ACCOUNTS_PRO: ${{ secrets.STRIPE_PRICE_ACCOUNTS_PRO }}
          STRIPE_PRICE_ACCOUNTS_ENTERPRISE: ${{ secrets.STRIPE_PRICE_ACCOUNTS_ENTERPRISE }}
          STRIPE_PRICE_DOMAINS_BASIC: ${{ secrets.STRIPE_PRICE_DOMAINS_BASIC }}
          STRIPE_PRICE_DOMAINS_PRO: ${{ secrets.STRIPE_PRICE_DOMAINS_PRO }}
          STRIPE_PRICE_DOMAINS_ENTERPRISE: ${{ secrets.STRIPE_PRICE_DOMAINS_ENTERPRISE }}
          STRIPE_PRICE_PLATFORM_BASE: ${{ secrets.STRIPE_PRICE_PLATFORM_BASE }}
          SES_REGION: ${{ secrets.SES_REGION }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          YAHOO_OAUTH_CLIENT_ID: ${{ secrets.YAHOO_OAUTH_CLIENT_ID }}
          YAHOO_OAUTH_CLIENT_SECRET: ${{ secrets.YAHOO_OAUTH_CLIENT_SECRET }}
          OUTLOOK_OAUTH_CLIENT_ID: ${{ secrets.OUTLOOK_OAUTH_CLIENT_ID }}
          OUTLOOK_OAUTH_CLIENT_SECRET: ${{ secrets.OUTLOOK_OAUTH_CLIENT_SECRET }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          ENVIRONMENT="${{ github.event.inputs.environment || 'dev' }}"
          ./scripts/deploy-infrastructure.sh "$ENVIRONMENT"
          
          # Load outputs for subsequent steps
          source .deploy-outputs
          echo "BACKEND_REPO_URL=$BACKEND_REPO_URL" >> $GITHUB_ENV
          echo "FRONTEND_BUCKET=$FRONTEND_BUCKET" >> $GITHUB_ENV
          echo "FRONTEND_DISTRIBUTION_ID=$FRONTEND_DISTRIBUTION_ID" >> $GITHUB_ENV
          echo "BACKEND_API_URL=$BACKEND_API_URL" >> $GITHUB_ENV
          echo "FRONTEND_URL=$FRONTEND_URL" >> $GITHUB_ENV
          echo "ECS_CLUSTER=email-client-$ENVIRONMENT-cluster" >> $GITHUB_ENV
          echo "ECS_SERVICE=email-client-$ENVIRONMENT-backend" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend Docker image
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ steps.get-account-id.outputs.account_id }}
          GIT_COMMIT_SHA: ${{ github.sha }}
        run: |
          ENVIRONMENT="${{ github.event.inputs.environment || 'dev' }}"
          ./scripts/deploy-backend.sh "$ENVIRONMENT"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE }}" \
            --force-new-deployment

      - name: Build frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_APP_URL: ${{ env.FRONTEND_URL }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          FRONTEND_URL: ${{ env.FRONTEND_URL }}
          FRONTEND_BUCKET: ${{ env.FRONTEND_BUCKET }}
          FRONTEND_DISTRIBUTION_ID: ${{ env.FRONTEND_DISTRIBUTION_ID }}
        run: |
          ENVIRONMENT="${{ github.event.inputs.environment || 'dev' }}"
          ./scripts/deploy-frontend.sh "$ENVIRONMENT"

      - name: Deployment summary
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          echo "## Deployment Complete! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment || 'dev' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend URL:** ${{ env.FRONTEND_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Backend API:** ${{ env.BACKEND_API_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Note: ECS service update may take a few minutes to complete._" >> $GITHUB_STEP_SUMMARY
